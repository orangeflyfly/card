<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>萬界裂痕 - 模組化開發版</title>
    <style>
        /* 這裡保留之前的 CSS 並優化，為節省空間略過重複部分，重點在 JS 結構 */
        :root { --p-color: #3498db; --e-color: #e74c3c; }
        body { background: #1a1a2e; color: white; font-family: sans-serif; margin: 0; }
        #setup-screen { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .class-btn { padding: 20px; margin: 10px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; width: 200px; }
        .mage-btn { background: #3498db; color: white; }
        .warrior-btn { background: #c0392b; color: white; }
        /* 其餘樣式同前... */
    </style>
</head>
<body>

<!-- 職業選擇介面 -->
<div id="setup-screen">
    <h1>選擇你的職業</h1>
    <button class="class-btn mage-btn" onclick="startGame('MAGE')">奧法大師 (法師)</button>
    <button class="class-btn warrior-btn" onclick="startGame('WARRIOR')">鋼鐵之軀 (戰士)</button>
</div>

<div id="game-ui" style="display:none;">
    <!-- 這裡放之前的遊戲容器內容 -->
    <div id="game-container">
        <!-- 渲染區域... (同前) -->
    </div>
</div>

<script>
/** 
 * 模組一：資料庫 
 */
const CARD_DATABASE = {
    MAGE: [
        { name: "見習法師", cost: 1, atk: 1, hp: 2, type: 'minion' },
        { name: "火球術", cost: 4, atk: 6, hp: 0, type: 'spell' },
        { name: "奧術巨人", cost: 8, atk: 8, hp: 8, type: 'minion' }
    ],
    WARRIOR: [
        { name: "狂暴老兵", cost: 3, atk: 2, hp: 4, type: 'minion' },
        { name: "重裝步兵", cost: 2, atk: 2, hp: 3, type: 'minion' },
        { name: "斬首", cost: 1, atk: 0, hp: 0, type: 'spell', desc: "造成4點傷害" }
    ],
    NEUTRAL: [
        { name: "守衛機器人", cost: 2, atk: 2, hp: 3, type: 'minion' },
        { name: "冒險者", cost: 1, atk: 1, hp: 1, type: 'minion' }
    ]
};

/** 
 * 模組二：遊戲引擎 
 */
class GameCore {
    constructor(playerClass) {
        this.player = {
            class: playerClass,
            hp: 30,
            mana: 1,
            maxMana: 1,
            deck: this.buildDeck(playerClass),
            hand: [],
            board: []
        };
        this.enemy = { hp: 30, board: [] };
        this.initGame();
    }

    buildDeck(pClass) {
        // 抓取職業卡 + 中立卡 混合成 30 張
        let pool = [...CARD_DATABASE[pClass], ...CARD_DATABASE.NEUTRAL];
        let deck = [];
        for(let i=0; i<30; i++) deck.push({...pool[i % pool.length]});
        return deck;
    }

    initGame() {
        for(let i=0; i<3; i++) this.draw();
    }

    draw() {
        if(this.player.deck.length > 0 && this.player.hand.length < 10) {
            this.player.hand.push(this.player.deck.pop());
        }
    }
    
    // 這裡後續會加入更複雜的法術邏輯判斷
}

/** 
 * 模組三：UI 渲染器 (與 GameCore 互動)
 */
let game;
function startGame(choice) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    game = new GameCore(choice);
    // 此處呼叫渲染函式... (略)
}

// 監製，這是我重構後的邏輯。
</script>
</body>
</html>
