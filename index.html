<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>萬界對戰：網頁原型版</title>
    <style>
        :root { --p-color: #3498db; --e-color: #e74c3c; }
        body { background: #2c3e50; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        #game-container { display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        
        /* 戰場區域 */
        .battlefield { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 10px; border-top: 1px solid #444; }
        #enemy-board { background: rgba(231, 76, 60, 0.1); }
        #player-board { background: rgba(52, 152, 219, 0.1); }

        /* 卡牌樣式 */
        .card {
            width: 100px; height: 140px; background: #ecf0f1; border-radius: 8px; color: #333;
            position: relative; cursor: pointer; transition: transform 0.2s; border: 2px solid #bdc3c7;
        }
        .card:hover { transform: translateY(-10px); z-index: 10; }
        .card.active { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .card .cost { position: absolute; top: 5px; left: 5px; background: #2980b9; color: white; border-radius: 50%; width: 25px; height: 25px; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .card .stats { position: absolute; bottom: 5px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; }
        .atk { color: #d35400; } .hp { color: #c0392b; }
        .name { text-align: center; margin-top: 40px; font-size: 14px; font-weight: bold; }

        /* 介面區 */
        .ui-bar { height: 60px; background: #34495e; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #hand-area { height: 160px; display: flex; justify-content: center; gap: 5px; padding: 10px; background: #1a252f; }
        
        .btn { padding: 10px 20px; background: #27ae60; border: none; color: white; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #2ecc71; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 敵方資訊 -->
    <div class="ui-bar">
        <div>對方英雄 HP: <span id="enemy-hp">30</span></div>
        <div>敵方手牌: <span id="enemy-hand-count">3</span></div>
    </div>

    <!-- 戰場 -->
    <div id="enemy-board" class="battlefield"></div>
    <div id="player-board" class="battlefield"></div>

    <!-- 玩家手牌與資訊 -->
    <div class="ui-bar">
        <div>我的能量: <span id="mana">1</span> / <span id="max-mana">1</span></div>
        <button class="btn" onclick="endTurn()">結束回合</button>
        <div>我的 HP: <span id="player-hp">30</span></div>
    </div>
    <div id="hand-area"></div>
</div>

<script>
    // 遊戲狀態
    const gameState = {
        player: { hp: 30, mana: 1, maxMana: 1, hand: [], board: [] },
        enemy: { hp: 30, board: [] },
        selectedCardIdx: null,
        selectedMinionIdx: null
    };

    // 初始卡牌庫
    const cardData = [
        { name: "見習法師", cost: 2, atk: 2, hp: 3 },
        { name: "守衛機器人", cost: 2, atk: 2, hp: 3 },
        { name: "狂暴老兵", cost: 3, atk: 2, hp: 4 },
        { name: "重裝巨魔", cost: 6, atk: 6, hp: 7 }
    ];

    // 初始化：抽 3 張牌
    function init() {
        for(let i=0; i<3; i++) drawCard();
        render();
    }

    function drawCard() {
        if(gameState.player.hand.length < 10) {
            const randomCard = cardData[Math.floor(Math.random() * cardData.length)];
            gameState.player.hand.push({...randomCard});
        }
    }

    function playCard(idx) {
        const card = gameState.player.hand[idx];
        if(gameState.player.mana >= card.cost && gameState.player.board.length < 7) {
            gameState.player.mana -= card.cost;
            gameState.player.board.push(gameState.player.hand.splice(idx, 1)[0]);
            render();
        } else {
            alert("能量不足或場地已滿！");
        }
    }

    function endTurn() {
        if(gameState.player.maxMana < 10) gameState.player.maxMana++;
        gameState.player.mana = gameState.player.maxMana;
        drawCard();
        render();
    }

    // 渲染畫面
    function render() {
        // 更新數值
        document.getElementById('mana').innerText = gameState.player.mana;
        document.getElementById('max-mana').innerText = gameState.player.maxMana;
        document.getElementById('player-hp').innerText = gameState.player.hp;
        document.getElementById('enemy-hp').innerText = gameState.enemy.hp;

        // 渲染手牌
        const handArea = document.getElementById('hand-area');
        handArea.innerHTML = '';
        gameState.player.hand.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="cost">${card.cost}</div><div class="name">${card.name}</div><div class="stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
            div.onclick = () => playCard(i);
            handArea.appendChild(div);
        });

        // 渲染我方戰場
        const playerBoard = document.getElementById('player-board');
        playerBoard.innerHTML = '';
        gameState.player.board.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="name">${card.name}</div><div class="stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
            playerBoard.appendChild(div);
        });
    }

    init();
</script>
</body>
</html>
