<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>萬界裂痕：特效與 AI 升級版</title>
    <style>
        :root { --mage: #3498db; --warrior: #e74c3c; --primary: #66fcf1; }
        body { background: #0b0c10; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        #game-ui { display: grid; grid-template-rows: 80px 1fr 1fr 80px 180px; height: 100vh; }
        .battlefield { display: flex; align-items: center; justify-content: center; gap: 15px; position: relative; }
        #enemy-board { background: rgba(231, 76, 60, 0.05); }
        #player-board { background: rgba(52, 152, 219, 0.05); }

        /* 英雄與 UI */
        .hero { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1f2833; position: relative; z-index: 10; transition: transform 0.1s; }
        .info-bar { display: flex; align-items: center; justify-content: space-around; background: #1f2833; border-y: 1px solid #45a29e; }
        
        /* 卡牌 */
        .card { width: 110px; height: 150px; background: #c5c6c7; border-radius: 10px; color: #1f2833; position: relative; cursor: pointer; border: 3px solid #45a29e; transition: 0.2s; }
        .card.selected { border-color: #f1c40f; box-shadow: 0 0 20px #f1c40f; transform: translateY(-10px); }
        .cost { position: absolute; top: -10px; left: -10px; background: #45a29e; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .stats { position: absolute; bottom: 5px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; }

        /* 特效元件 */
        .projectile { position: fixed; width: 20px; height: 20px; background: #f1c40f; border-radius: 50%; box-shadow: 0 0 15px #f39c12; z-index: 1000; transition: all 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045); pointer-events: none; }
        .damage-pop { position: absolute; color: #ff4d4d; font-weight: bold; font-size: 24px; animation: popUp 0.6s ease-out forwards; z-index: 1001; pointer-events: none; }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-50px) scale(1.2); opacity: 0; } }
        .shake { animation: shake 0.2s ease-in-out 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        #setup-screen { position: fixed; inset: 0; background: #0b0c10; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { padding: 10px 25px; background: #45a29e; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>萬界裂痕 - 啟源</h1>
    <div style="display: flex; gap: 20px;">
        <button onclick="startGame('MAGE')">法師啟動</button>
        <button onclick="startGame('WARRIOR')">戰士啟動</button>
    </div>
</div>

<div id="game-ui" style="display:none;">
    <div class="info-bar">
        <div>能量: <span id="e-mana">0</span></div>
        <div class="hero" id="e-hero" onclick="handleSelect('E_HERO', this)">敵方<span id="e-hp">30</span></div>
        <div>對手手牌: <span id="e-hand">3</span></div>
    </div>
    
    <div id="enemy-board" class="battlefield"></div>
    <div id="player-board" class="battlefield"></div>

    <div class="info-bar">
        <div>能量: <span id="p-mana">1</span>/<span id="p-max">1</span></div>
        <div class="hero" id="p-hero">我方<span id="p-hp">30</span></div>
        <button id="end-btn" onclick="playerEndTurn()">結束回合</button>
    </div>

    <div id="hand-area" class="battlefield"></div>
</div>

<script>
const DB = {
    MAGE: [{name:"奧術彈", cost:1, atk:3, type:"spell"}, {name:"學徒", cost:2, atk:2, hp:2, type:"minion"}],
    WARRIOR: [{name:"重擊", cost:2, atk:4, type:"spell"}, {name:"衛兵", cost:3, atk:2, hp:5, type:"minion"}],
    NEUTRAL: [{name:"小卒", cost:1, atk:1, hp:1, type:"minion"}, {name:"巨魔", cost:5, atk:5, hp:5, type:"minion"}]
};

let game = {
    p: { hp: 30, mana: 1, max: 1, hand: [], board: [] },
    e: { hp: 30, mana: 1, max: 1, hand: [], board: [] },
    turn: 'P', state: 'IDLE', selectedIdx: null
};

function startGame(choice) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'grid';
    // 初始化雙方手牌
    for(let i=0; i<4; i++) { draw('p', choice); draw('e', 'NEUTRAL'); }
    render();
}

function draw(who, choice) {
    let pool = [...DB[choice || 'NEUTRAL'], ...DB.NEUTRAL];
    game[who].hand.push({...pool[Math.floor(Math.random()*pool.length)]});
}

function createFX(fromEl, toEl, color = "#f1c40f") {
    const fromRect = fromEl.getBoundingClientRect();
    const toRect = toEl.getBoundingClientRect();
    const p = document.createElement('div');
    p.className = 'projectile';
    p.style.backgroundColor = color;
    p.style.left = (fromRect.left + fromRect.width/2) + 'px';
    p.style.top = (fromRect.top + fromRect.height/2) + 'px';
    document.body.appendChild(p);

    setTimeout(() => {
        p.style.left = (toRect.left + toRect.width/2) + 'px';
        p.style.top = (toRect.top + toRect.height/2) + 'px';
    }, 50);

    setTimeout(() => {
        p.remove();
        toEl.classList.add('shake');
        showDamagePop(toEl);
        setTimeout(() => toEl.classList.remove('shake'), 200);
    }, 450);
}

function showDamagePop(el) {
    const rect = el.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'damage-pop';
    pop.innerText = '-?'; // 簡化顯示
    pop.style.left = rect.left + 'px';
    pop.style.top = rect.top + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 600);
}

function handleSelect(type, el, idx) {
    if(game.turn !== 'P') return;

    if(game.state === 'IDLE' && type === 'P_HAND') {
        let card = game.p.hand[idx];
        if(game.p.mana < card.cost) return;
        if(card.type === 'minion') {
            game.p.mana -= card.cost;
            game.p.board.push({...game.p.hand.splice(idx, 1)[0], ready: false});
        } else {
            game.state = 'TARGETING_SPELL';
            game.selectedIdx = idx;
        }
    } else if(game.state === 'IDLE' && type === 'P_BOARD') {
        if(!game.p.board[idx].ready) return;
        game.state = 'TARGETING_ATK';
        game.selectedIdx = idx;
    } else if(game.state.includes('TARGETING')) {
        executeAction(type, el, idx);
    }
    render();
}

function executeAction(type, el, idx) {
    let attackerEl = (game.state === 'TARGETING_SPELL') ? 
        document.querySelectorAll('#hand-area .card')[game.selectedIdx] :
        document.querySelectorAll('#player-board .card')[game.selectedIdx];

    createFX(attackerEl, el, (game.state === 'TARGETING_SPELL' ? '#9b59b6' : '#f1c40f'));

    setTimeout(() => {
        if(game.state === 'TARGETING_SPELL') {
            let card = game.p.hand[game.selectedIdx];
            if(type === 'E_HERO') game.e.hp -= card.atk;
            else if(type === 'E_BOARD') game.e.board[idx].hp -= card.atk;
            game.p.mana -= card.cost;
            game.p.hand.splice(game.selectedIdx, 1);
        } else {
            let pM = game.p.board[game.selectedIdx];
            if(type === 'E_HERO') game.e.hp -= pM.atk;
            else if(type === 'E_BOARD') {
                let eM = game.e.board[idx];
                eM.hp -= pM.atk; pM.hp -= eM.atk;
            }
            pM.ready = false;
        }
        cleanUp();
        render();
    }, 500);
    game.state = 'IDLE';
}

function cleanUp() {
    game.p.board = game.p.board.filter(m => m.hp > 0);
    game.e.board = game.e.board.filter(m => m.hp > 0);
}

async function playerEndTurn() {
    game.turn = 'E';
    game.p.board.forEach(m => m.ready = true);
    document.getElementById('end-btn').innerText = "敵方回合...";
    
    // 敵人 AI 邏輯
    await new Promise(r => setTimeout(r, 1000));
    // 1. AI 出牌
    game.e.hand.forEach((c, i) => {
        if(game.e.board.length < 7 && c.type === 'minion') {
            game.e.board.push({...game.e.hand.splice(i, 1)[0], ready: true});
        }
    });
    render();

    // 2. AI 攻擊
    await new Promise(r => setTimeout(r, 1000));
    for(let m of game.e.board) {
        const targetEl = document.getElementById('p-hero');
        const fromEl = document.querySelectorAll('#enemy-board .card')[0]; // 簡化
        if(fromEl) {
            createFX(fromEl, targetEl, "#e74c3c");
            game.p.hp -= m.atk;
        }
        await new Promise(r => setTimeout(r, 600));
    }

    // 結束敵方回合
    game.turn = 'P';
    if(game.p.max < 10) game.p.max++;
    game.p.mana = game.p.max;
    draw('p', 'MAGE');
    document.getElementById('end-btn').innerText = "結束回合";
    render();
}

function render() {
    document.getElementById('p-hp').innerText = game.p.hp;
    document.getElementById('e-hp').innerText = game.e.hp;
    document.getElementById('p-mana').innerText = game.p.mana;
    document.getElementById('p-max').innerText = game.p.max;
    document.getElementById('e-hand').innerText = game.e.hand.length;

    const renderArea = (id, data, type) => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        data.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = `card ${game.selectedIdx === i && game.state !== 'IDLE' ? 'selected' : ''}`;
            div.innerHTML = `<div class="cost">${c.cost || 0}</div><div style="padding:10px">${c.name}</div>
                             <div class="stats"><span>${c.atk}</span><span>${c.hp || ''}</span></div>`;
            div.onclick = () => handleSelect(type, div, i);
            el.appendChild(div);
        });
    };

    renderArea('hand-area', game.p.hand, 'P_HAND');
    renderArea('player-board', game.p.board, 'P_BOARD');
    renderArea('enemy-board', game.e.board, 'E_BOARD');
}
</script>
</body>
</html>
