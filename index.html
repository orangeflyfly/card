<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>萬界對戰：戰鬥強化版</title>
    <style>
        :root { --p-color: #3498db; --e-color: #e74c3c; --highlight: #f1c40f; }
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        #game-container { display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        
        /* 戰場區域 */
        .battlefield { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 15px; border-bottom: 1px solid #333; position: relative; }
        #enemy-board { background: rgba(231, 76, 60, 0.05); }
        #player-board { background: rgba(52, 152, 219, 0.05); }

        /* 英雄頭像 */
        .hero { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #bdc3c7; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #2c3e50; cursor: pointer; transition: 0.2s; }
        .hero.targetable:hover { border-color: var(--e-color); box-shadow: 0 0 20px var(--e-color); }
        .hero-hp { font-weight: bold; font-size: 20px; }

        /* 卡牌與生物樣式 */
        .card {
            width: 110px; height: 150px; background: #ecf0f1; border-radius: 10px; color: #333;
            position: relative; cursor: pointer; transition: all 0.2s; border: 3px solid #7f8c8d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .card:hover { transform: translateY(-5px); }
        .card.selected { border-color: var(--highlight); box-shadow: 0 0 20px var(--highlight); transform: scale(1.05); }
        .card.can-attack { border-color: #2ecc71; }
        
        .card .cost { position: absolute; top: -10px; left: -10px; background: #2980b9; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid white; }
        .card .stats { position: absolute; bottom: 5px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; }
        .atk { background: #f39c12; color: white; padding: 2px 6px; border-radius: 4px; }
        .hp { background: #c0392b; color: white; padding: 2px 6px; border-radius: 4px; }
        .name { text-align: center; margin-top: 45px; font-size: 14px; font-weight: bold; padding: 0 5px; }

        /* UI 介面 */
        .ui-bar { height: 70px; background: #16213e; display: flex; align-items: center; padding: 0 40px; justify-content: space-between; border-top: 1px solid #333; }
        #hand-area { height: 180px; display: flex; justify-content: center; gap: 10px; padding: 15px; background: #0f3460; }
        
        .btn { padding: 12px 25px; background: #e94560; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #ff4d6d; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 敵方區域 -->
    <div class="ui-bar">
        <div class="hero" id="enemy-hero" onclick="handleTarget('enemy-hero')">
            <span style="font-size: 12px;">敵方英雄</span>
            <span class="hero-hp" id="enemy-hp">30</span>
        </div>
        <div>對手手牌: <span id="enemy-hand-count">5</span></div>
    </div>

    <div id="enemy-board" class="battlefield"></div>
    
    <!-- 玩家戰場 -->
    <div id="player-board" class="battlefield"></div>

    <!-- 玩家介面 -->
    <div class="ui-bar">
        <div>能量: <span id="mana">1</span> / <span id="max-mana">1</span></div>
        <button class="btn" onclick="endTurn()">結束回合</button>
        <div class="hero" style="border-color: var(--p-color);">
            <span style="font-size: 12px;">我的英雄</span>
            <span class="hero-hp" id="player-hp">30</span>
        </div>
    </div>
    <div id="hand-area"></div>
</div>

<script>
    const state = {
        player: { hp: 30, mana: 1, maxMana: 1, hand: [], board: [] },
        enemy: { hp: 30, board: [
            { name: "練習木靶", atk: 0, hp: 5, canAttack: false },
            { name: "敵方守衛", atk: 2, hp: 3, canAttack: false }
        ] },
        selectedAttackerIdx: null
    };

    const cardPool = [
        { name: "見習法師", cost: 1, atk: 1, hp: 2 },
        { name: "重裝步兵", cost: 2, atk: 2, hp: 3 },
        { name: "狂暴老兵", cost: 3, atk: 4, hp: 2 },
        { name: "奧術巨人", cost: 5, atk: 5, hp: 5 }
    ];

    function init() {
        for(let i=0; i<4; i++) drawCard();
        render();
    }

    function drawCard() {
        if(state.player.hand.length < 10) {
            state.player.hand.push({...cardPool[Math.floor(Math.random() * cardPool.length)]});
        }
    }

    // 出牌
    function playCard(idx) {
        const card = state.player.hand[idx];
        if(state.player.mana >= card.cost && state.player.board.length < 7) {
            state.player.mana -= card.cost;
            const newMinion = {...state.player.hand.splice(idx, 1)[0], canAttack: false};
            state.player.board.push(newMinion);
            state.selectedAttackerIdx = null;
            render();
        }
    }

    // 選擇攻擊者
    function selectAttacker(idx) {
        if (state.player.board[idx].canAttack) {
            state.selectedAttackerIdx = idx;
        } else {
            alert("該生物本回合已攻擊過，或剛上場還在打瞌睡！");
        }
        render();
    }

    // 點擊目標 (敵方生物或英雄)
    function handleTarget(type, idx = null) {
        if (state.selectedAttackerIdx === null) return;

        const attacker = state.player.board[state.selectedAttackerIdx];

        if (type === 'enemy-minion') {
            const target = state.enemy.board[idx];
            // 戰鬥運算
            target.hp -= attacker.atk;
            attacker.hp -= target.atk;
            attacker.canAttack = false;
        } else if (type === 'enemy-hero') {
            state.enemy.hp -= attacker.atk;
            attacker.canAttack = false;
        }

        // 檢查死亡
        state.enemy.board = state.enemy.board.filter(m => m.hp > 0);
        state.player.board = state.player.board.filter(m => m.hp > 0);
        
        state.selectedAttackerIdx = null;
        render();
    }

    function endTurn() {
        if(state.player.maxMana < 10) state.player.maxMana++;
        state.player.mana = state.player.maxMana;
        // 恢復攻擊權利
        state.player.board.forEach(m => m.canAttack = true);
        drawCard();
        state.selectedAttackerIdx = null;
        render();
    }

    function render() {
        document.getElementById('mana').innerText = state.player.mana;
        document.getElementById('max-mana').innerText = state.player.maxMana;
        document.getElementById('player-hp').innerText = state.player.hp;
        document.getElementById('enemy-hp').innerText = state.enemy.hp;

        // 手牌
        const handArea = document.getElementById('hand-area');
        handArea.innerHTML = '';
        state.player.hand.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="cost">${card.cost}</div><div class="name">${card.name}</div><div class="stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
            div.onclick = () => playCard(i);
            handArea.appendChild(div);
        });

        // 敵方戰場
        const enemyBoard = document.getElementById('enemy-board');
        enemyBoard.innerHTML = '';
        state.enemy.board.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = `card ${state.selectedAttackerIdx !== null ? 'targetable' : ''}`;
            div.style.background = '#f2dede';
            div.innerHTML = `<div class="name">${card.name}</div><div class="stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
            div.onclick = () => handleTarget('enemy-minion', i);
            enemyBoard.appendChild(div);
        });

        // 我方戰場
        const playerBoard = document.getElementById('player-board');
        playerBoard.innerHTML = '';
        state.player.board.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = `card ${state.selectedAttackerIdx === i ? 'selected' : (card.canAttack ? 'can-attack' : '')}`;
            div.innerHTML = `<div class="name">${card.name}</div><div class="stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
            div.onclick = (e) => { e.stopPropagation(); selectAttacker(i); };
            playerBoard.appendChild(div);
        });

        // 英雄目標狀態
        document.getElementById('enemy-hero').className = `hero ${state.selectedAttackerIdx !== null ? 'targetable' : ''}`;
    }

    init();
</script>
</body>
</html>
