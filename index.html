<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>萬界戰場 - 水墨自走棋版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 1. 全域訊息提示容器 -->
<div id="game-msg"></div>

<!-- 2. 初始畫面：選擇英雄 -->
<div id="setup-screen">
    <h1 class="ink-title">萬界戰場</h1>
    <p>THE OMNI RIFT: AUTO BATTLER</p>
    <div class="class-select-area">
        <!-- 這裡的 ID 必須與 heroes.js 的 key 完全一致 -->
        <div class="class-card-btn" onclick="startGame('LIN_FAN')">
            <h2>林凡</h2>
            <div class="tribe-tag">凡人</div>
            <p>暖心熱飯：每回合隨機賦予棋子 +1/+1</p>
        </div>
        <div class="class-card-btn" onclick="startGame('DAN_DAN')">
            <h2>丹丹</h2>
            <div class="tribe-tag">凡人</div>
            <p>劍意通明：開戰時最左邊獲得「聖盾」</p>
        </div>
        <div class="class-card-btn" onclick="startGame('FEI_FEI')">
            <h2>飛飛</h2>
            <div class="tribe-tag">半獸</div>
            <p>半夜加班：刷新商店時機率獲得靈石</p>
        </div>
        <div class="class-card-btn" onclick="startGame('MO_MO')">
            <h2>墨墨</h2>
            <div class="tribe-tag">不死</div>
            <p>死者甦生：花費 1 靈石賦予棋子「重生」</p>
        </div>
    </div>
</div>

<!-- 3. 遊戲主介面 -->
<div id="game-ui" style="display:none;">
    
    <!-- 左側：羈絆顯示區 (新增) -->
    <div id="bond-area">
        <h4>啟動羈絆</h4>
        <div style="font-size:12px; color:#666;">暫無羈絆</div>
    </div>
    
    <!-- 頂部資訊列 -->
    <div class="info-bar">
        <div class="phase-display">階段: <span id="game-phase" style="color: var(--highlight);">招募準備</span></div>
        
        <div class="hero" id="e-hero">
            <div class="hero-label">強敵</div>
            <div class="hero-hp">HP: <span id="e-hp">30</span></div>
        </div>
        
        <div class="timer-display">⏳ <span id="game-timer">20</span> 秒</div>
    </div>
    
    <!-- 戰場：敵方陣型 -->
    <div id="enemy-board" class="battlefield"></div>
    
    <!-- 戰場：我方陣型 -->
    <div id="player-board" class="battlefield"></div>

    <!-- 中部資訊列：資源與英雄 -->
    <div class="info-bar">
        <div class="resource-display">靈石: 💎 <span id="p-gold">3</span> / <span id="p-max-gold">3</span></div>
        
        <button class="action-btn" id="refresh-btn" onclick="refreshShop()">刷新 (💎1)</button>
        
        <div class="hero" id="p-hero">
            <div class="hero-label">我方英雄</div>
            <div class="hero-hp">HP: <span id="p-hp">30</span></div>
        </div>
        
        <button class="action-btn end-btn" id="ready-btn" onclick="forceStartCombat()">準備完成</button>
    </div>

    <!-- 底部：招募區 (商店) -->
    <div id="shop-area" class="battlefield shop-bg"></div>
</div>

<!-- 4. 引用主程式 -->
<script type="module" src="src/main.js"></script>

</body>
</html>
