<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>萬界裂痕 - 模組化啟源版</title>
    <!-- 連結外部樣式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 1. 新增：全域訊息提示容器 (用於顯示「你的回合」、「能量不足」等) -->
<div id="game-msg"></div>

<!-- 2. 職業選擇畫面 (對應 style.css 中的 #setup-screen) -->
<div id="setup-screen">
    <h1>萬界裂痕</h1>
    <p>THE OMNI RIFT: GENESIS</p>
    <div class="class-select-area">
        <div class="class-card-btn" onclick="startGame('MAGE')">
            <h2>奧法師</h2>
            <p>掌控元素與遠程爆發</p>
        </div>
        <div class="class-card-btn" onclick="startGame('WARRIOR')">
            <h2>破陣者</h2>
            <p>近戰防禦與嗜血反擊</p>
        </div>
    </div>
</div>

<!-- 3. 遊戲主介面 (對應 style.css 中的 #game-ui) -->
<div id="game-ui" style="display:none;">
    
    <!-- 頂部資訊列：敵方狀態 -->
    <div class="info-bar">
        <!-- 修正：新增敵方能量動態顯示，讓 AI 行為透明化 -->
        <div>敵方能量: ⚡ <span id="e-mana">1</span></div>
        
        <!-- 敵方英雄頭像 -->
        <div class="hero" id="e-hero" onclick="handleSelect('E_HERO', this)">
            <div style="font-size: 12px; opacity: 0.8;">敵方英雄</div>
            <div style="font-size: 18px;">HP: <span id="e-hp">30</span></div>
        </div>
        
        <!-- 敵方手牌計數 -->
        <div>對手手牌: <span id="e-hand">3</span></div>
    </div>
    
    <!-- 戰場區域：敵方生物 -->
    <div id="enemy-board" class="battlefield">
        <!-- 由 game.js 動態渲染卡牌 -->
    </div>
    
    <!-- 戰場區域：我方生物 -->
    <div id="player-board" class="battlefield">
        <!-- 由 game.js 動態渲染卡牌 -->
    </div>

    <!-- 中部資訊列：玩家狀態 -->
    <div class="info-bar">
        <!-- 玩家能量顯示 -->
        <div>我的能量: ⚡ <span id="p-mana">1</span> / <span id="p-max">1</span></div>
        
        <!-- 我方英雄頭像 -->
        <div class="hero" id="p-hero">
            <div style="font-size: 12px; opacity: 0.8;">我方英雄</div>
            <div style="font-size: 18px;">HP: <span id="p-hp">30</span></div>
        </div>
        
        <!-- 結束回合按鈕 -->
        <button id="end-btn" onclick="playerEndTurn()">結束回合</button>
    </div>

    <!-- 底部區域：玩家手牌 -->
    <div id="hand-area" class="battlefield">
        <!-- 由 game.js 動態渲染卡牌 -->
    </div>
</div>

<!-- 4. 引用遊戲核心邏輯腳本 -->
<script src="game.js"></script>

</body>
</html>
