<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>萬界裂痕 - 模組化啟源版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="setup-screen">
    <h1>萬界裂痕 - 啟源</h1>
    <div style="display: flex; gap: 20px;">
        <button onclick="startGame('MAGE')">法師啟動</button>
        <button onclick="startGame('WARRIOR')">戰士啟動</button>
    </div>
</div>

<div id="game-ui" style="display:none;">
    <div class="info-bar">
        <div>能量: ⚡</div>
        <div class="hero" id="e-hero" onclick="handleSelect('E_HERO', this)">敵方 HP:<span id="e-hp">30</span></div>
        <div>對手手牌: <span id="e-hand">3</span></div>
    </div>
    
    <div id="enemy-board" class="battlefield"></div>
    <div id="player-board" class="battlefield"></div>

    <div class="info-bar">
        <div>能量: <span id="p-mana">1</span>/<span id="p-max">1</span></div>
        <div class="hero" id="p-hero">我方 HP:<span id="p-hp">30</span></div>
        <button id="end-btn" onclick="playerEndTurn()">結束回合</button>
    </div>

    <div id="hand-area" class="battlefield"></div>
</div>

<script src="game.js"></script>
</body>
</html>
